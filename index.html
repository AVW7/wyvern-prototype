       experiment layer (docs/SANCTUARY_3D_DRAGON_PLAN.md) — a single

       management-sim UI overlay (rosters, base screens) in #ui-overlay. -->

  <canvas id="dragon3d"></canvas>
  <div id="ui-overlay"></div>

  <!-- Vite resolves the pinned npm Phaser dependency before loading the game. -->
  <script type="module" src="/src/bootstrap.js"></script>
</body>
